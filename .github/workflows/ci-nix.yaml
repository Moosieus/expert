name: Nix CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    name: Nix Build

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7

      - name: Setup Nix GHA Cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Nix files are formatted
        run:  nix develop --command bash -c "nixfmt --check flake.nix ./nix/expert.nix"

      - name: Build
        run: nix build .#expert

  deps:
    runs-on: ubuntu-latest
    name: Nix Deps Up-To-Date

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7

      - name: Setup Nix GHA Cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Regenerate deps.nix
        run: nix run .#update-deps

      - name: Ensure deps.nix is up to date
        run: |
          if ! git diff --exit-code; then
            echo "::error::deps.nix is out of date. Run 'mix deps.nix' in each app and commit the result."
            exit 1
          fi
